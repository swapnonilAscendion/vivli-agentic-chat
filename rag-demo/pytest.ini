[pytest]
# Pytest configuration for RAG chatbot tests

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Show summary of test results
addopts = -v --tb=short

# Asyncio mode
asyncio_mode = auto

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
